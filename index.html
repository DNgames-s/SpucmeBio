<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <title>𝚂𝚙𝚞𝚌𝚖𝚎🌹</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            max-width: 100%;
            overflow-x: hidden;
            overflow-y: hidden;
        }

        body {
            font-family: 'Arial', serif;
        }

        .gradient-background {
            height: 100vh;
            background: linear-gradient(135deg, #27b491, #47bdadcb, #279fb4);
            background-size: 400% 400%;
            animation: gradient 13s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #name {
            transform: translateY(60px);
            width: 350px;
            height: 490px;
            display: block;
            margin: auto;
            border-radius: 15px;
            background-color: rgba(71, 74, 82, 0.6); 
            border: 3px solid #ccc;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .img {
            border-radius: 100%;
            width: 140px;
            height: 140px;
            margin: auto;
            display: block;
            transform: translateY(-58px);
        }

        .imm {
            color: white;
            transform: translate(90px, -40px);
            font-size: 40px;
            display: block;
        }

        .imm2 {
            color: rgb(153, 153, 153);
            transform: translate(100px, -40px);
            display: block;
        }

        .b1, .b2 {
            color: white;
            background-color: rgb(33, 141, 160);
            border: 0px;
            border-radius: 9px;
            font-size: 17px;
            display: block;
        }

        .b1 {
            width: 300px;
            height: 50px;
        }

        .b2 {
            width: 145px;
            height: 50px;
        }

        .b1:hover, .b2:hover {
            background-color: rgb(24, 108, 122);
        }

        .d1 { transform: translate(24px, -10px); }
        .d2 { transform: translate(24px, 5px); }
        .d3 { transform: translate(24px, 20px); }
        .d4 { transform: translate(24px, 35px); }
        .d5 { transform: translate(180px, -15px); }

        #ccc {
            width: 350px;
            height: 100px;
            margin: auto;
            margin-top: 75px;
            border-radius: 15px;
            background-color: rgba(71, 74, 82, 0.6); 
            border: 3px solid #ccc;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 1;
            animation: rcc 4s ease infinite;
        }

        @keyframes rcc {
            0% { transform: translateY(7px); }
            50% { transform: translateY(-7px); }
            100% { transform: translateY(7px); }
        }

        .font {
            color: white;
            font-size: 17px;
            transform: translate(10px, 20px);
            font-family: 'Courier New', Courier, monospace;
            display: block;
        }
    </style>
</head>
<body style="position: fixed; width: 100vw; height: 110vh;">
    <div class="gradient-background">
        <div id="frf">
            <div id="name">
                <img class="img" src="spucme.jpg">
                <h1 class="imm">𝚂𝚙𝚞𝚌𝚖𝚎🌹</h1>
                <h3 class="imm2">DNG-Ames Team</h3>

                <form action="https://t.me/perh_spucme" method="get" target="_self">
                    <button class="b1 d1">TELEGRAM</button>
                </form>
                <form action="https://t.me/spucmebio" method="get" target="_self">
                    <button class="b1 d2">BIO</button>
                </form>
                <form action="https://t.me/spucme_donateBot" method="get" target="_self">
                    <button class="b1 d3">DONATE</button>
                </form>
                <form action="https://t.me/lekylo" method="get" target="_self">
                    <button class="b2 d4">DEF</button>
                </form>
                <form action="https://t.me/dng_Ames" method="get" target="_self">
                    <button class="b2 d5">TGK</button>
                </form>
            </div>

            <div id="ccc">
                <p class="font">"Каждый день может быть не очень хорошим, но в каждом дне есть хорошее"</p>
            </div>
        </div>
    </div>
</body>
</html>
