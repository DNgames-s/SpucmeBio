<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta meta name="viewport" content="width=device-width, user-scalable=no" />
    <title>𝚂𝚙𝚞𝚌𝚖𝚎🌹</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            }

        body, html {
            height: 100%;
            }

        .gradient-background {
            height: 100vh;
            background: linear-gradient(270deg,  #27b491,#b42727, #27b491,#b42727);
            background-size: 400% 400%;
            animation: gradient 25s ease infinite;
            }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
                }
            }

        #name {
            transform: translateY(60px);
            background-color: rgb(60, 63, 70);
            width: 350px;
            height: 510px;
            display: block;
            margin: auto;
            border-radius: 15px;
        }


        .img {
            border-radius: 100%;
            width: 140px;
            height: 140px;
            margin: auto;
            display: block;
            transform: translateY(-58px);
        }

        .imm {
            color: white;
            transform: translate(90px, -60px);
            font-size: 40px;
            display: block;
        }

        .imm2 {
            color: rgb(153, 153, 153);
            transform: translate(100px, -60px);
            display: block;
        }

        .b1 {
            color: white;
            background-color: rgb(33, 141, 160);
            border: 0px;
            border-radius: 9px;
            width: 300px ;
            height: 50px;
            font-size: 17px;
            display: block;
        }
        .b1:hover {
            background-color: rgb(24, 108, 122);
            display: block;
        }

        .b2 {
            color: white;
            background-color: rgb(33, 141, 160);
            border: 0px;
            border-radius: 9px;
            width: 145px ;
            height: 50px;
            font-size: 17px;
            display: block;
        }
        .b2:hover {
            background-color: rgb(24, 108, 122);
            display: block;
        }

        .d1 {
            transform: translate(24px, 20px);
            display: block;
        }

        .d2 {
            transform: translate(24px, 35px);
            display: block;
        }

        .d3 {
            transform: translate(24px, 50px);
            display: block;
        }

        .d4 {
            transform: translate(24px, 65px);
            display: block;
        }

        .d5 {
            transform: translate(180px, 15px);
            display: block;
        }

        #ccc {
            width: 350px;
            height: 100px;
            margin: auto;
            display: block;
            transform: translateY(70px);
            border-radius: 15px;
            background-color: rgb(60, 63, 70);
            z-index: 1;
        }
        
        

        .font {
            color: white;
            font-size: 17px;
            transform: translate(10px, 20px);
            font-family: 'Courier New', Courier, monospace;
            display: block;
            }

    </style>
</head>
<body>
    <div class="gradient-background">
    <div id="name">
        <img class="img" src="spucme.jpg">
        <h1 class="imm">𝚂𝚙𝚞𝚌𝚖𝚎🌹</h1>
        <h3 class="imm2">DNG-Ames Team</h3>

    <form action="https://t.me/perh_spucme" method="get" target="_self">
        <button class="b1 d1">TELEGRAM</button>
    </form>

    <form action="https://t.me/spucmebio" method="get" target="_self">
        <button class="b1 d2">BIO</button>
    </form>

    <form action="https://t.me/spucme_donateBot" method="get" target="_self">
        <button class="b1 d3">DONATE</button>
    </form>

    <form action="https://t.me/liosiris" method="get" target="_self">
        <button class="b2 d4">DEF</button>
    </form>

    <form action="https://t.me/dng_Ames" method="get" target="_self">
        <button class="b2 d5">TGK</button>
    </form>

    </div>

    <div id="ccc">
        <p class="font">"Каждый день может быть не очень хорошим, но в каждом дне есть хорошее"</p>
    </div>
    </div>
</body>
</html>
